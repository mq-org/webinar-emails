<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ウェビナー終了後メール一覧</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif; }
  pre { font-family: inherit; white-space: pre-wrap; word-break: break-word; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
</style>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-5xl mx-auto px-4 py-6">
  <header class="mb-6 flex flex-wrap items-end justify-between gap-3">
    <div>
      <h1 class="text-2xl font-bold">ウェビナー終了後メール一覧</h1>
      <p class="text-sm text-gray-500 mt-1">on-line-school.jp の各ウェビナー「開催日時後」フォローアップメールを表示します</p>
    </div>
    <div class="text-right text-xs text-gray-500">
      <div>最終更新: <span id="updated_at">...</span></div>
      <div class="mt-1">対象: <span id="count">...</span>本</div>
    </div>
  </header>

  <div class="mb-4 flex gap-2 flex-wrap items-center">
    <input id="search" type="search" placeholder="ウェビナー名で検索..." class="flex-1 min-w-[200px] px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-400">
  </div>

  <div id="list" class="space-y-4"></div>

  <footer class="mt-12 text-xs text-gray-400 text-center">
    <p>WordPress側で変更があった場合は週次自動更新で反映されます。緊急時はSuiにご相談ください。</p>
  </footer>
</div>

<script>
function fmt(iso){
  if(!iso) return '-';
  try { return new Date(iso).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return iso; }
}
function esc(s){return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function urlify(text){
  return esc(text).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" class="text-emerald-600 underline break-all">$1</a>');
}

let DATA = null;
function render(filter=''){
  if(!DATA) return;
  const list = document.getElementById('list');
  const q = filter.trim().toLowerCase();
  const scenarios = DATA.scenarios.filter(s => !q || (s.title||'').toLowerCase().includes(q) || (s.author||'').toLowerCase().includes(q));
  list.innerHTML = scenarios.map(s => `
    <article class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <header class="px-4 py-3 bg-gradient-to-r from-emerald-50 to-white border-b border-gray-100">
        <div class="flex flex-wrap items-center gap-2 justify-between">
          <h2 class="text-lg font-semibold">${esc(s.title)}</h2>
          <div class="text-xs text-gray-500 flex gap-3">
            <span>作成者: ${esc(s.author||'-')}</span>
            <span>メール数: ${s.email_count}通</span>
            <a href="${esc(s.wp_edit_url)}" target="_blank" class="text-emerald-600 underline">WordPressで編集</a>
          </div>
        </div>
      </header>
      <div class="divide-y divide-gray-100">
        ${s.emails.map(e => `
          <details class="group">
            <summary class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50">
              <span class="text-xs font-mono text-gray-400 w-12">${e.order}通目</span>
              <span class="flex-1">
                <div class="font-medium">${esc(e.id_title || e.subject)}</div>
                <div class="text-xs text-gray-500 mt-0.5">${esc(e.schedule)}</div>
              </span>
              <span class="text-gray-400 group-open:rotate-90 transition-transform">›</span>
            </summary>
            <div class="px-4 pb-4 pt-1 space-y-3 bg-gray-50/50">
              <div>
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">件名</div>
                <div class="text-sm">${esc(e.subject)}</div>
              </div>
              <div>
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">本文</div>
                <pre class="text-sm bg-white p-3 rounded border border-gray-200">${urlify(e.body)}</pre>
              </div>
              ${e.benefits && e.benefits.length ? `
              <div>
                <div class="text-xs font-semibold text-emerald-700 uppercase tracking-wide mb-1">本文内LPの特典</div>
                <ul class="text-sm bg-emerald-50/60 p-3 rounded border border-emerald-200 list-disc pl-6 space-y-1">
                  ${e.benefits.map(b => `<li>${esc(b)}</li>`).join('')}
                </ul>
              </div>` : ''}
              ${e.urls && e.urls.length ? `
              <div>
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">本文内のURL</div>
                <ul class="text-sm space-y-1">
                  ${e.urls.map(u => `<li><a href="${esc(u)}" target="_blank" class="text-emerald-600 underline break-all">${esc(u)}</a></li>`).join('')}
                </ul>
              </div>` : ''}
            </div>
          </details>
        `).join('')}
      </div>
    </article>
  `).join('') || '<p class="text-center text-gray-400 py-12">該当なし</p>';
}

fetch('data/webinars.json').then(r => r.json()).then(d => {
  DATA = d;
  document.getElementById('updated_at').textContent = fmt(d.generated_at);
  document.getElementById('count').textContent = d.scenarios.length;
  render();
});

document.getElementById('search').addEventListener('input', e => render(e.target.value));
</script>
</body>
</html>
